<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP-DOWN SHOOTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
  // ============================================================
  // SECTION 1: CONSTANTS & COLOR PALETTE
  // ============================================================
  const W = 800, H = 600;
  const COLORS = {
    bg:        '#0d1117',
    bgDot:     '#161b22',
    player:    '#4fc3f7',
    playerDark:'#0288d1',
    walker:    '#ef5350',
    walkerDark:'#b71c1c',
    runner:    '#ab47bc',
    runnerDark:'#6a1b9a',
    bullet:    '#ffeb3b',
    bulletGlow:'rgba(255,235,59,0.3)',
    hpGood:    '#66bb6a',
    hpLow:     '#ef5350',
    hpBg:      '#1e272e',
    score:     '#ffd700',
    white:     '#ffffff',
    gray:      '#546e7a',
    overlay:   'rgba(13,17,23,0.82)',
    gridDot:   '#1a2332',
  };

  const PLAYER_SPEED  = 180;
  const PLAYER_SIZE   = 20;
  const PLAYER_HP     = 100;
  const BULLET_SPEED  = 420;
  const BULLET_COOL   = 0.22;
  const BULLET_LIFE   = 1.8;
  const WALKER_SPEED  = 65;
  const WALKER_HP     = 2;
  const WALKER_SIZE   = 18;
  const RUNNER_SPEED  = 130;
  const RUNNER_HP     = 1;
  const RUNNER_SIZE   = 13;
  const INVINCIBLE_T  = 0.6;
  const SEPARATION    = 2.0;

  // ============================================================
  // SECTION 2: WEB AUDIO (lazy-init, procedural beeps)
  // ============================================================
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(type, freqStart, freqEnd, duration, gainVal = 0.18) {
    if (!audioCtx) return;
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      const t = audioCtx.currentTime;
      osc.frequency.setValueAtTime(freqStart, t);
      osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), t + duration);
      gain.gain.setValueAtTime(gainVal, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.start(t);
      osc.stop(t + duration + 0.01);
    } catch(e) {}
  }

  const SFX = {
    shoot()   { playTone('square',   880, 220, 0.10, 0.12); },
    explode() { playTone('sawtooth', 200,  30, 0.25, 0.22); },
    hurt()    { playTone('sine',     150,  80, 0.30, 0.20); },
    levelup() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => playTone('square', f, f, 0.12, 0.15), i * 90);
      });
    },
    win() {
      if (!audioCtx) return;
      [523,659,784,1047,1047,1047].forEach((f, i) => {
        setTimeout(() => playTone('square', f, f, 0.15, 0.18), i * 100);
      });
    }
  };

  // ============================================================
  // SECTION 3: INPUT HANDLER
  // ============================================================
  const INPUT = {
    keys: {},
    justPressedKeys: new Set(),
    mouse: { x: W / 2, y: H / 2, down: false },
    justFired: false,
  };

  const canvas = document.getElementById('game');

  function getCanvasScale() {
    const rect = canvas.getBoundingClientRect();
    return { sx: W / rect.width, sy: H / rect.height };
  }

  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
    if (!INPUT.keys[e.code]) INPUT.justPressedKeys.add(e.code);
    INPUT.keys[e.code] = true;
  });
  document.addEventListener('keyup', e => {
    INPUT.keys[e.code] = false;
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const { sx, sy } = getCanvasScale();
    INPUT.mouse.x = (e.clientX - rect.left) * sx;
    INPUT.mouse.y = (e.clientY - rect.top)  * sy;
  });
  canvas.addEventListener('mousedown', e => {
    initAudio();
    INPUT.mouse.down = true;
    INPUT.justFired = true;
  });
  canvas.addEventListener('mouseup', () => { INPUT.mouse.down = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  function clearJustPressed() {
    INPUT.justPressedKeys.clear();
    INPUT.justFired = false;
  }

  function isJustPressed(...codes) {
    return codes.some(c => INPUT.justPressedKeys.has(c));
  }

  // ============================================================
  // SECTION 4: SPRITE DRAWING (procedural pixel art)
  // ============================================================
  const ctx = canvas.getContext('2d');

  function drawBackground() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COLORS.gridDot;
    for (let x = 0; x <= W; x += 32) {
      for (let y = 0; y <= H; y += 32) {
        ctx.fillRect(x - 1, y - 1, 2, 2);
      }
    }
  }

  function drawPlayer(x, y, angle, hp, maxHp, invincible, time) {
    if (invincible && Math.floor(time * 10) % 2 === 0) return;
    ctx.save();
    ctx.translate(x, y);

    // Body shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(2, 4, 12, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    const legAnim = Math.sin(time * 8) * 4;
    ctx.fillStyle = COLORS.playerDark;
    ctx.fillRect(-8, 6, 6, 8 + legAnim);
    ctx.fillRect(2,  6, 6, 8 - legAnim);

    // Body
    ctx.fillStyle = COLORS.player;
    ctx.fillRect(-10, -8, 20, 18);

    // Chest stripe
    ctx.fillStyle = COLORS.playerDark;
    ctx.fillRect(-5, -6, 10, 4);

    // Head
    ctx.fillStyle = COLORS.player;
    ctx.fillRect(-7, -18, 14, 12);

    // Visor
    ctx.fillStyle = '#b3e5fc';
    ctx.fillRect(-5, -16, 10, 5);

    // Gun barrel (rotated)
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = COLORS.playerDark;
    ctx.fillRect(8, -3, 18, 6);   // barrel
    ctx.fillStyle = COLORS.player;
    ctx.fillRect(8, -2, 16, 4);
    ctx.restore();

    ctx.restore();
  }

  function drawWalker(x, y, angle, hp, maxHp, time) {
    ctx.save();
    ctx.translate(x, y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(2, 4, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Animated legs (6 appendages)
    ctx.fillStyle = COLORS.walkerDark;
    for (let i = 0; i < 6; i++) {
      const legAngle = (i / 6) * Math.PI * 2 + time * 4;
      const len = WALKER_SIZE * 0.9 + Math.sin(time * 6 + i) * 3;
      ctx.save();
      ctx.rotate(legAngle);
      ctx.fillRect(WALKER_SIZE * 0.5, -2, len, 4);
      ctx.restore();
    }

    // Body
    ctx.fillStyle = COLORS.walker;
    ctx.beginPath();
    ctx.arc(0, 0, WALKER_SIZE, 0, Math.PI * 2);
    ctx.fill();

    // Inner ring
    ctx.fillStyle = COLORS.walkerDark;
    ctx.beginPath();
    ctx.arc(0, 0, WALKER_SIZE * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Eye pointing toward player
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = '#ffcdd2';
    ctx.fillRect(6, -4, 8, 8);
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(10, -2, 4, 4);
    ctx.restore();

    // HP pips
    if (hp < maxHp) {
      ctx.fillStyle = COLORS.hpLow;
      ctx.fillRect(-12, -WALKER_SIZE - 8, 24, 4);
      ctx.fillStyle = COLORS.hpGood;
      ctx.fillRect(-12, -WALKER_SIZE - 8, 24 * (hp / maxHp), 4);
    }

    ctx.restore();
  }

  function drawRunner(x, y, angle, time) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 3, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Animated tail
    const tailWag = Math.sin(time * 12) * 6;
    ctx.fillStyle = COLORS.runnerDark;
    ctx.fillRect(-RUNNER_SIZE * 2.2, -3 + tailWag, RUNNER_SIZE * 1.5, 6);

    // Body (elongated)
    ctx.fillStyle = COLORS.runner;
    ctx.fillRect(-RUNNER_SIZE, -RUNNER_SIZE * 0.65, RUNNER_SIZE * 2.4, RUNNER_SIZE * 1.3);

    // Head nub
    ctx.fillStyle = COLORS.runner;
    ctx.fillRect(RUNNER_SIZE, -RUNNER_SIZE * 0.45, RUNNER_SIZE * 0.8, RUNNER_SIZE * 0.9);

    // Eyes
    ctx.fillStyle = '#e1bee7';
    ctx.fillRect(RUNNER_SIZE * 1.0, -RUNNER_SIZE * 0.35, 5, 5);
    ctx.fillStyle = '#1a0020';
    ctx.fillRect(RUNNER_SIZE * 1.0 + 2, -RUNNER_SIZE * 0.25, 3, 3);

    ctx.restore();
  }

  function drawBullet(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Glow
    ctx.fillStyle = COLORS.bulletGlow;
    ctx.fillRect(-10, -5, 20, 10);

    // Core
    ctx.fillStyle = COLORS.bullet;
    ctx.fillRect(-6, -2, 12, 4);

    // Bright tip
    ctx.fillStyle = '#fff';
    ctx.fillRect(4, -1, 4, 2);

    ctx.restore();
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }

  // ============================================================
  // SECTION 5: ENTITY CLASSES
  // ============================================================
  class Player {
    constructor() {
      this.x = W / 2;
      this.y = H / 2;
      this.hp = PLAYER_HP;
      this.maxHp = PLAYER_HP;
      this.angle = 0;
      this.cooldown = 0;
      this.invincible = 0;
      this.isDead = false;
    }

    update(dt, mouse) {
      // Movement
      let dx = 0, dy = 0;
      if (INPUT.keys['KeyW'] || INPUT.keys['ArrowUp'])    dy -= 1;
      if (INPUT.keys['KeyS'] || INPUT.keys['ArrowDown'])  dy += 1;
      if (INPUT.keys['KeyA'] || INPUT.keys['ArrowLeft'])  dx -= 1;
      if (INPUT.keys['KeyD'] || INPUT.keys['ArrowRight']) dx += 1;

      // Normalize diagonal
      if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }

      this.x = Math.max(PLAYER_SIZE, Math.min(W - PLAYER_SIZE, this.x + dx * PLAYER_SPEED * dt));
      this.y = Math.max(PLAYER_SIZE, Math.min(H - PLAYER_SIZE, this.y + dy * PLAYER_SPEED * dt));

      // Aim
      this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

      // Cooldown
      if (this.cooldown > 0) this.cooldown -= dt;

      // Invincibility
      if (this.invincible > 0) this.invincible -= dt;

      // Shoot
      let bullet = null;
      if ((INPUT.mouse.down || INPUT.justFired) && this.cooldown <= 0) {
        this.cooldown = BULLET_COOL;
        const ox = Math.cos(this.angle) * (PLAYER_SIZE + 10);
        const oy = Math.sin(this.angle) * (PLAYER_SIZE + 10);
        bullet = new Bullet(this.x + ox, this.y + oy, this.angle);
        SFX.shoot();
      }
      return bullet;
    }

    takeDamage(dmg) {
      if (this.invincible > 0) return;
      this.hp -= dmg;
      this.invincible = INVINCIBLE_T;
      SFX.hurt();
      if (this.hp <= 0) { this.hp = 0; this.isDead = true; }
    }

    draw(time) {
      drawPlayer(this.x, this.y, this.angle, this.hp, this.maxHp, this.invincible > 0, time);
    }
  }

  class Enemy {
    constructor(type, px, py) {
      this.type = type;
      this.isDead = false;

      if (type === 'walker') {
        this.hp     = WALKER_HP;
        this.maxHp  = WALKER_HP;
        this.speed  = WALKER_SPEED;
        this.size   = WALKER_SIZE;
        this.score  = 10;
      } else {
        this.hp     = RUNNER_HP;
        this.maxHp  = RUNNER_HP;
        this.speed  = RUNNER_SPEED;
        this.size   = RUNNER_SIZE;
        this.score  = 15;
      }

      // Spawn on random edge
      const side = Math.floor(Math.random() * 4);
      if (side === 0) { this.x = Math.random() * W;   this.y = -this.size - 5; }
      else if (side === 1) { this.x = W + this.size + 5; this.y = Math.random() * H; }
      else if (side === 2) { this.x = Math.random() * W;   this.y = H + this.size + 5; }
      else              { this.x = -this.size - 5;    this.y = Math.random() * H; }

      this.angle = Math.atan2(py - this.y, px - this.x);
    }

    update(dt, px, py, enemies) {
      // Move toward player
      this.angle = Math.atan2(py - this.y, px - this.x);
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;

      // Separation from other enemies
      for (const other of enemies) {
        if (other === this || other.isDead) continue;
        const ex = this.x - other.x;
        const ey = this.y - other.y;
        const distSq = ex * ex + ey * ey;
        const minDist = this.size + other.size;
        if (distSq < minDist * minDist && distSq > 0.001) {
          const dist = Math.sqrt(distSq);
          const push = (minDist - dist) / dist * SEPARATION;
          this.x += ex * push;
          this.y += ey * push;
        }
      }
    }

    takeDamage(dmg) {
      this.hp -= dmg;
      if (this.hp <= 0) { this.hp = 0; this.isDead = true; }
    }

    draw(time) {
      if (this.type === 'walker') {
        drawWalker(this.x, this.y, this.angle, this.hp, this.maxHp, time);
      } else {
        drawRunner(this.x, this.y, this.angle, time);
      }
    }
  }

  class Bullet {
    constructor(x, y, angle) {
      this.x = x;
      this.y = y;
      this.angle = angle;
      this.life = BULLET_LIFE;
      this.isDead = false;
      this.vx = Math.cos(angle) * BULLET_SPEED;
      this.vy = Math.sin(angle) * BULLET_SPEED;
    }

    update(dt) {
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.life -= dt;
      if (this.life <= 0 || this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
        this.isDead = true;
      }
    }

    draw() {
      drawBullet(this.x, this.y, this.angle);
    }
  }

  // ============================================================
  // SECTION 6: PARTICLE SYSTEM (fixed pool, no GC)
  // ============================================================
  const PARTICLE_POOL_SIZE = 200;
  const particles = Array.from({ length: PARTICLE_POOL_SIZE }, () => ({
    active: false, x: 0, y: 0, vx: 0, vy: 0,
    life: 0, maxLife: 0, size: 0, color: '#fff'
  }));

  function spawnParticles(x, y, color, count = 7) {
    let spawned = 0;
    for (let i = 0; i < PARTICLE_POOL_SIZE && spawned < count; i++) {
      const p = particles[i];
      if (!p.active) {
        p.active  = true;
        p.x       = x;
        p.y       = y;
        const a   = Math.random() * Math.PI * 2;
        const spd = 40 + Math.random() * 120;
        p.vx      = Math.cos(a) * spd;
        p.vy      = Math.sin(a) * spd;
        p.maxLife = 0.3 + Math.random() * 0.4;
        p.life    = p.maxLife;
        p.size    = 4 + Math.random() * 6;
        p.color   = color;
        spawned++;
      }
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      if (!p.active) continue;
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.vx   *= 0.88;
      p.vy   *= 0.88;
      p.life -= dt;
      if (p.life <= 0) p.active = false;
    }
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.active) drawParticle(p);
    }
  }

  // ============================================================
  // SECTION 7: LEVEL CONFIG
  // ============================================================
  const LEVELS = [
    {
      title:           'SECTOR 1',
      killsToAdvance:  15,
      survivalSeconds: null,
      spawnRate:       3.0,
      maxOnScreen:     5,
      walkerPct:       1.0,
    },
    {
      title:           'SECTOR 2',
      killsToAdvance:  25,
      survivalSeconds: null,
      spawnRate:       2.2,
      maxOnScreen:     8,
      walkerPct:       0.67,
    },
    {
      title:           'SECTOR 3',
      killsToAdvance:  40,
      survivalSeconds: null,
      spawnRate:       1.5,
      maxOnScreen:     12,
      walkerPct:       0.33,
    },
    {
      title:           'SECTOR 4',
      killsToAdvance:  null,
      survivalSeconds: 90,
      spawnRate:       0.9,
      maxOnScreen:     18,
      walkerPct:       0.25,
    },
  ];

  // ============================================================
  // SECTION 8: STATE MACHINE + GAME LOOP
  // ============================================================
  const STATES = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3, WIN: 4 };

  let state = STATES.MENU;
  let player, enemies, bullets;
  let score, currentLevelIndex, levelKills, spawnTimer, survivalTimer;
  let levelCompleteTimer;
  let totalTime;
  let gameTime;

  function initGame() {
    player            = new Player();
    enemies           = [];
    bullets           = [];
    score             = 0;
    currentLevelIndex = 0;
    levelKills        = 0;
    spawnTimer        = 0;
    survivalTimer     = 0;
    totalTime         = 0;
    gameTime          = 0;
    state             = STATES.PLAYING;
  }

  function startLevel(idx) {
    currentLevelIndex = idx;
    levelKills        = 0;
    spawnTimer        = 0;
    survivalTimer     = 0;
    enemies           = [];
    bullets           = [];
    state             = STATES.PLAYING;
  }

  function spawnEnemy() {
    const lvl = LEVELS[currentLevelIndex];
    const type = Math.random() < lvl.walkerPct ? 'walker' : 'runner';
    enemies.push(new Enemy(type, player.x, player.y));
  }

  function circleCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x2 - x1, dy = y2 - y1;
    return dx * dx + dy * dy < (r1 + r2) * (r1 + r2);
  }

  function updatePlaying(dt) {
    const lvl = LEVELS[currentLevelIndex];
    gameTime += dt;
    totalTime += dt;

    // Survival timer
    if (lvl.survivalSeconds !== null) {
      survivalTimer += dt;
    }

    // Spawn enemies
    spawnTimer += dt;
    if (spawnTimer >= lvl.spawnRate && enemies.length < lvl.maxOnScreen) {
      spawnTimer = 0;
      spawnEnemy();
    }

    // Update player
    const newBullet = player.update(dt, INPUT.mouse);
    if (newBullet) bullets.push(newBullet);

    // Update enemies
    for (const e of enemies) {
      if (!e.isDead) e.update(dt, player.x, player.y, enemies);
    }

    // Update bullets
    for (const b of bullets) {
      if (!b.isDead) b.update(dt);
    }

    // Bullet vs enemy collisions
    for (const b of bullets) {
      if (b.isDead) continue;
      for (const e of enemies) {
        if (e.isDead) continue;
        if (circleCollide(b.x, b.y, 5, e.x, e.y, e.size)) {
          b.isDead = true;
          e.takeDamage(1);
          spawnParticles(e.x, e.y, e.type === 'walker' ? COLORS.walker : COLORS.runner, 5);
          if (e.isDead) {
            score += e.score;
            levelKills++;
            spawnParticles(e.x, e.y, e.type === 'walker' ? COLORS.walker : COLORS.runner, 8);
            SFX.explode();
          }
          break;
        }
      }
    }

    // Enemy vs player collisions
    for (const e of enemies) {
      if (e.isDead) continue;
      if (circleCollide(e.x, e.y, e.size, player.x, player.y, PLAYER_SIZE * 0.8)) {
        player.takeDamage(10);
        // Push enemy away
        const ang = Math.atan2(e.y - player.y, e.x - player.x);
        e.x += Math.cos(ang) * 30;
        e.y += Math.sin(ang) * 30;
      }
    }

    // Prune dead entities
    bullets = bullets.filter(b => !b.isDead);
    enemies = enemies.filter(e => !e.isDead);

    // Update particles
    updateParticles(dt);

    // Check win/level conditions
    if (player.isDead) {
      state = STATES.GAME_OVER;
      return;
    }

    if (lvl.killsToAdvance !== null && levelKills >= lvl.killsToAdvance) {
      triggerLevelComplete();
    } else if (lvl.survivalSeconds !== null && survivalTimer >= lvl.survivalSeconds) {
      triggerLevelComplete();
    }
  }

  function triggerLevelComplete() {
    SFX.levelup();
    levelCompleteTimer = 2.5;
    state = STATES.LEVEL_COMPLETE;
  }

  function updateLevelComplete(dt) {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      if (currentLevelIndex >= LEVELS.length - 1) {
        SFX.win();
        state = STATES.WIN;
      } else {
        // Restore 20 HP
        player.hp = Math.min(player.maxHp, player.hp + 20);
        startLevel(currentLevelIndex + 1);
      }
    }
  }

  // ============================================================
  // SECTION 9: SCREEN RENDERERS
  // ============================================================
  function drawHUD() {
    const lvl = LEVELS[currentLevelIndex];

    // HP bar
    const barW = 160, barH = 14;
    const bx = 16, by = 16;
    ctx.fillStyle = COLORS.hpBg;
    ctx.fillRect(bx, by, barW, barH);
    const hpPct = player.hp / player.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? COLORS.hpGood : hpPct > 0.25 ? '#ffb300' : COLORS.hpLow;
    ctx.fillRect(bx, by, Math.round(barW * hpPct), barH);
    ctx.strokeStyle = COLORS.gray;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, barW, barH);
    ctx.fillStyle = COLORS.white;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`HP ${player.hp}/${player.maxHp}`, bx + 4, by + 10);

    // Score (center)
    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`SCORE: ${score}`, W / 2, 30);

    // Level info (right)
    ctx.fillStyle = COLORS.white;
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(lvl.title, W - 16, 22);

    if (lvl.survivalSeconds !== null) {
      const remaining = Math.max(0, lvl.survivalSeconds - survivalTimer);
      const pct = remaining / lvl.survivalSeconds;
      ctx.fillStyle = pct < 0.33 ? COLORS.hpLow : COLORS.score;
      ctx.fillText(`SURVIVE: ${Math.ceil(remaining)}s`, W - 16, 40);
    } else {
      ctx.fillStyle = '#90a4ae';
      ctx.fillText(`KILLS: ${levelKills}/${lvl.killsToAdvance}`, W - 16, 40);
    }

    ctx.textAlign = 'left';
  }

  function drawMenu() {
    drawBackground();

    // Title block
    ctx.fillStyle = COLORS.player;
    ctx.font = 'bold 54px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TOP-DOWN', W / 2, 180);
    ctx.fillText('SHOOTER', W / 2, 240);

    ctx.fillStyle = COLORS.walker;
    ctx.font = 'bold 16px monospace';
    ctx.fillText('RETRO EDITION', W / 2, 272);

    // Instructions
    ctx.fillStyle = COLORS.white;
    ctx.font = '14px monospace';
    ctx.fillText('WASD / ARROWS — MOVE', W / 2, 340);
    ctx.fillText('MOUSE — AIM & SHOOT', W / 2, 362);
    ctx.fillText('4 LEVELS OF INCREASINGLY DEADLY SECTORS', W / 2, 394);

    // Prompt
    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 17px monospace';
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    if (blink) ctx.fillText('[ CLICK OR PRESS ENTER TO START ]', W / 2, 460);

    // Draw decorative sprites
    drawWalker(160, 520, Math.PI * 0.1, 2, 2, performance.now() / 1000);
    drawRunner(640, 520, Math.PI * 1.1, performance.now() / 1000);
    drawPlayer(W / 2, 510, -Math.PI / 2, 100, 100, false, performance.now() / 1000);

    ctx.textAlign = 'left';
  }

  function drawGameOver(time) {
    // frozen game state already on canvas; draw overlay
    ctx.fillStyle = COLORS.overlay;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = COLORS.hpLow;
    ctx.font = 'bold 60px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, 220);

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 28px monospace';
    ctx.fillText(`FINAL SCORE: ${score}`, W / 2, 290);

    ctx.fillStyle = COLORS.white;
    ctx.font = '16px monospace';
    ctx.fillText(`Reached: ${LEVELS[currentLevelIndex].title}`, W / 2, 340);
    ctx.fillText(`Total kills: ${score / 10 | 0}+`, W / 2, 368);

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 16px monospace';
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    if (blink) ctx.fillText('[ CLICK OR PRESS ENTER TO RESTART ]', W / 2, 440);

    ctx.textAlign = 'left';
  }

  function drawLevelComplete() {
    ctx.fillStyle = COLORS.overlay;
    ctx.fillRect(0, 0, W, H);

    const isLast = currentLevelIndex >= LEVELS.length - 1;
    ctx.fillStyle = COLORS.player;
    ctx.font = 'bold 44px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(isLast ? 'SECTOR CLEAR!' : 'SECTOR CLEAR!', W / 2, 220);

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 22px monospace';
    ctx.fillText(LEVELS[currentLevelIndex].title + ' COMPLETE', W / 2, 272);

    ctx.fillStyle = COLORS.hpGood;
    ctx.font = '16px monospace';
    if (!isLast) {
      ctx.fillText('+20 HP RESTORED', W / 2, 320);
      ctx.fillStyle = COLORS.white;
      ctx.fillText(`Advancing to ${LEVELS[currentLevelIndex + 1].title}...`, W / 2, 352);
    }

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`SCORE: ${score}`, W / 2, 400);

    ctx.textAlign = 'left';
  }

  function drawWin() {
    drawBackground();

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 62px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W / 2, 190);

    ctx.fillStyle = COLORS.player;
    ctx.font = 'bold 22px monospace';
    ctx.fillText('ALL SECTORS CLEARED', W / 2, 240);

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 28px monospace';
    ctx.fillText(`FINAL SCORE: ${score}`, W / 2, 310);

    ctx.fillStyle = COLORS.hpGood;
    ctx.font = '16px monospace';
    ctx.fillText('Congratulations, Commander!', W / 2, 360);

    ctx.fillStyle = COLORS.score;
    ctx.font = 'bold 16px monospace';
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    if (blink) ctx.fillText('[ CLICK OR PRESS ENTER TO PLAY AGAIN ]', W / 2, 450);

    drawPlayer(W / 2, 530, -Math.PI / 2, 100, 100, false, performance.now() / 1000);

    ctx.textAlign = 'left';
  }

  // ============================================================
  // SECTION 10: ENTRY POINT & GAME LOOP
  // ============================================================
  let lastTimestamp = 0;

  function gameLoop(timestamp) {
    let dt = (timestamp - lastTimestamp) / 1000;
    lastTimestamp = timestamp;

    // Cap dt to prevent bullet teleportation on tab focus
    dt = Math.min(dt, 1 / 20);

    const time = timestamp / 1000;

    // --- STATE MACHINE ---
    switch (state) {
      case STATES.MENU:
        drawMenu();
        if (isJustPressed('Enter', 'Space') || INPUT.justFired) {
          initAudio();
          initGame();
        }
        break;

      case STATES.PLAYING:
        updatePlaying(dt);
        drawBackground();
        // Draw order: particles (under), enemies, player, bullets, particles (on top), HUD
        drawParticles();
        for (const e of enemies) e.draw(time);
        player.draw(time);
        for (const b of bullets) b.draw();
        drawHUD();
        break;

      case STATES.LEVEL_COMPLETE:
        // Keep game drawn underneath
        drawBackground();
        drawParticles();
        for (const e of enemies) e.draw(time);
        player.draw(time);
        for (const b of bullets) b.draw();
        drawHUD();
        updateLevelComplete(dt);
        drawLevelComplete();
        break;

      case STATES.GAME_OVER:
        // Re-draw last game state under overlay
        drawBackground();
        drawParticles();
        for (const e of enemies) e.draw(time);
        player.draw(time);
        for (const b of bullets) b.draw();
        drawHUD();
        drawGameOver(time);
        if (isJustPressed('Enter', 'Space') || INPUT.justFired) {
          initAudio();
          initGame();
        }
        break;

      case STATES.WIN:
        drawWin();
        if (isJustPressed('Enter', 'Space') || INPUT.justFired) {
          initAudio();
          initGame();
        }
        break;
    }

    clearJustPressed();
    requestAnimationFrame(gameLoop);
  }

  // Start
  requestAnimationFrame(ts => {
    lastTimestamp = ts;
    requestAnimationFrame(gameLoop);
  });
  </script>
</body>
</html>
