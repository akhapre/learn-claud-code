<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      min-height: 1.6em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    #scores {
      display: flex;
      gap: 40px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .score-box.active-player {
      color: #e94560;
    }

    #restart {
      padding: 10px 28px;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 1px;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box" id="score-x">
      X <span id="x-count">0</span>
    </div>
    <div class="score-box">
      Draws <span id="draw-count">0</span>
    </div>
    <div class="score-box" id="score-o">
      O <span id="o-count">0</span>
    </div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };

      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`Player ${current}'s turn`);
      updateScoreHighlight();
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScoreHighlight() {
      document.getElementById('score-x').classList.toggle('active-player', current === 'X' && !gameOver);
      document.getElementById('score-o').classList.toggle('active-player', current === 'O' && !gameOver);
    }

    function checkWin() {
      return WINS.find(([a, b, c]) => board[a] && board[a] === board[b] && board[a] === board[c]);
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winning = checkWin();
      if (winning) {
        winning.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        scores[current]++;
        document.getElementById(`${current.toLowerCase()}-count`).textContent = scores[current];
        setStatus(`Player ${current} wins!`);
        gameOver = true;
        updateScoreHighlight();
      } else if (board.every(Boolean)) {
        scores.D++;
        document.getElementById('draw-count').textContent = scores.D;
        setStatus("It's a draw!");
        gameOver = true;
        updateScoreHighlight();
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
        updateScoreHighlight();
      }
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
